<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ALPS Book Store</title>
  <link rel="profile" href="alps.xml">
  <link rel="stylesheet" href="level2.css">
</head>
<body>

  <header>
    <div>
      <a href="index.html">ALPS Book Store</a>
      <nav>
        <a href="catalog.html" class="goToCatalog" title="Navigate to the book catalog list screen. All books are displayed.">Catalog</a>
        <a href="shoppingcart.html" class="goToCart" title="Navigate to the screen displaying the contents of the current shopping cart.">Cart</a>
      </nav>
    </div>
  </header>

  <main>
    <nav>
      <a href="shoppingcart.html" class="goToCart" title="Navigate to the screen displaying the contents of the current shopping cart.">Cart</a>
      <span>/</span>
      <span>Checkout</span>
    </nav>

    <h1 class="Checkout">Checkout</h1>

    <section>
      <h2>Order Items</h2>
      <article>
        <span class="title">The Art of Programming</span>
        <span class="quantity">× 1</span>
        <span class="price">¥2,480</span>
      </article>
      <article>
        <span class="title">Design Patterns Explained</span>
        <span class="quantity">× 2</span>
        <span class="price">¥6,400</span>
      </article>
    </section>

    <section>
      <h2>Shipping</h2>
      <dl>
        <dt>Name</dt>
        <dd class="userName">Taro Yamada</dd>
        <dt>Address</dt>
        <dd class="shippingAddress">〒150-0001 Tokyo, Shibuya-ku, Jingumae 1-2-3</dd>
      </dl>
    </section>

    <section>
      <h2>Payment</h2>
      <form method="post" action="payment.html" class="doPlaceOrder">
        <div>
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod" name="paymentMethod" class="paymentMethod">
            <option value="credit_card">Credit Card</option>
            <option value="bank_transfer">Bank Transfer</option>
            <option value="cash_on_delivery">Cash on Delivery</option>
          </select>
        </div>
        <div>
          <span>Total</span>
          <span class="totalAmount">¥8,880</span>
        </div>
        <button type="submit">Place Order</button>
      </form>
    </section>
  </main>

  <footer>
    <div>Mock generated from ALPS profile: ALPS Book Store</div>
  </footer>

</body>
</html>
