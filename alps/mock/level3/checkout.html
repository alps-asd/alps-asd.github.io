<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ALPS Book Store</title>
  <link rel="profile" href="alps.xml">
  <link rel="stylesheet" href="level3.css">
</head>
<body>

  <header>
    <div>
      <a href="index.html">ALPS Book Store</a>
      <nav>
        <a href="catalog.html" class="goToCatalog" title="Navigate to the book catalog list screen. All books are displayed.">Catalog</a>
        <a href="shoppingcart.html" class="goToCart" title="Navigate to the screen displaying the contents of the current shopping cart.">Cart</a>
      </nav>
    </div>
  </header>

  <main>
    <nav>
      <a href="shoppingcart.html" class="goToCart" title="Navigate to the screen displaying the contents of the current shopping cart.">Cart</a>
      <span>/</span>
      <span>Checkout</span>
    </nav>

    <h1 class="Checkout">Checkout</h1>

    <section>
      <h2>01 — Customer Information</h2>
      <form method="get" action="checkout.html" class="doUserInfo">
        <div>
          <label for="userName">Full Name</label>
          <input type="text" id="userName" name="userName" class="userName" placeholder="Taro Yamada">
        </div>
        <div>
          <label for="userEmail">Email Address</label>
          <input type="email" id="userEmail" name="userEmail" class="userEmail" placeholder="taro@example.com">
        </div>
        <button type="submit">Save</button>
      </form>
    </section>

    <section>
      <h2>02 — Shipping Address</h2>
      <form method="get" action="checkout.html" class="doShippingInfo">
        <div>
          <label for="shippingAddress">Address</label>
          <textarea id="shippingAddress" name="shippingAddress" rows="3" class="shippingAddress" placeholder="123-4567&#10;Tokyo, Shibuya-ku…"></textarea>
        </div>
        <button type="submit">Save</button>
      </form>
    </section>

    <a href="payment.html" class="goToPayment" title="Navigate to the payment screen to input payment information and complete the order.">Continue to Payment</a>
  </main>

  <footer>
    <div>Mock generated from ALPS profile: ALPS Book Store</div>
  </footer>

</body>
</html>
